name: Create release package
on:
  workflow_dispatch:
    inputs:
      PACKAGE_VERSION:
        description: 'Package Version'
        required: false
  push:
    branches: [ 'dev/**' ]
    paths:
      - 'inc/**'
      - 'lib/**'
      - 'src/**'
      - 'pluginEnvironmentChecker/**'
      - 'public/**'
      - 'resources/**'
      - '.distignore'
      - 'composer.*'
      - 'package*'
      - 'readme.txt'
      - 'webpack.config.js'
      - '*.php'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create_archive:
    uses: inpsyde/reusable-workflows/.github/workflows/build-and-distribute.yml@main
    secrets:
      GITHUB_USER_EMAIL: ${{ secrets.DEPLOYBOT_EMAIL }}
      GITHUB_USER_NAME: ${{ secrets.DEPLOYBOT_USER }}
      GITHUB_USER_SSH_KEY: ${{ secrets.DEPLOYBOT_SSH_PRIVATE_KEY }}
      GITHUB_USER_SSH_PUBLIC_KEY: ${{ secrets.DEPLOYBOT_SSH_PUBLIC_KEY }}
      NPM_REGISTRY_TOKEN: ${{ secrets.DEPLOYBOT_GITHUB_TOKEN_PACKAGES }}
    with:
      PACKAGE_NAME: mollie-payments-for-woocommerce
      PACKAGE_VERSION: ${{ inputs.PACKAGE_VERSION }}
